                    acl-filter cpm type ipv6 {
                    }
                }
            }
        }
        grpc-server eda-discovery {
            admin-state enable
            rate-limit 65535
            session-limit 1024
            metadata-authentication true
            default-tls-profile true
            network-instance mgmt
            port 50052
            services [
                gnmi
                gnsi
            ]
        }
        grpc-server eda-insecure-mgmt {
            admin-state enable
            rate-limit 65535
            session-limit 1024
            metadata-authentication true
            port 57411
            services [
                gnmi
                gnoi
                gnsi
            ]
        }
