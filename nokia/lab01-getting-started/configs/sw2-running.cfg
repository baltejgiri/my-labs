            session-limit 1024
            metadata-authentication true
            tls-profile EDA
            network-instance mgmt
            port 57410
            services [
                gnmi
                gnoi
                gnsi
            ]
        }
        grpc-server insecure-mgmt {
            admin-state enable
            rate-limit 65000
            network-instance mgmt
            port 57401
