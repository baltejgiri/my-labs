lab:
  title: "CCNA Lab 03 — Spanning Tree Protocol"
  description: "Observe STP behaviour, manipulate root bridge placement, configure PortFast and BPDU Guard."
  notes: "All switches boot with default STP settings. No priority or port configuration is pre-applied."
  timestamp: 1750000000.0
  version: 0.0.3

nodes:
  - id: n0
    label: SW1
    node_definition: iosvl2
    x: 0
    y: 0
    configuration: |
      hostname SW1
      no ip domain-lookup
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
