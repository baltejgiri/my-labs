links:
  # Triangle: SW1 <-> SW2 (dual uplinks for redundancy)
  - id: l0
    n1: n0
    i1: 0
    n2: n1
    i2: 0
  - id: l1
    n1: n0
    i1: 1
    n2: n1
    i2: 1
  # Triangle: SW1 <-> SW3 (dual uplinks)
  - id: l2
    n1: n0
    i1: 2
    n2: n2
    i2: 0
  - id: l3
    n1: n0
    i1: 3
    n2: n2
    i2: 1
  # Triangle: SW2 <-> SW3
  - id: l4
    n1: n1
    i1: 2
    n2: n2
    i2: 2
  # Access ports
  - id: l5
    n1: n0
    i1: 4
    n2: n3
    i2: 0
  - id: l6
    n1: n1
    i1: 3
    n2: n4
    i2: 0
  - id: l7
    n1: n2
    i1: 3
    n2: n5
    i2: 0
