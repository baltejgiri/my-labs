lab:
  title: "CCNA Lab 09 — IPv6 Fundamentals & Routing"
  description: "Configure IPv6 addressing, SLAAC, DHCPv6, and OSPFv3. Implement dual-stack on all routers."
  notes: "No IPv6 configuration is pre-applied. You configure everything from the address space 2001:db8::/32."
  timestamp: 1750000000.0
  version: 0.0.3

nodes:
  - id: n0
    label: R1
    node_definition: iosv
    x: -300
    y: 0
    configuration: |
      hostname R1
      no ip domain-lookup
      ipv6 unicast-routing
      !
      interface GigabitEthernet0/0
       description Link to R2
       no shutdown
      !
      interface GigabitEthernet0/1
       description LAN1
       no shutdown
      !
      interface Loopback0
       no shutdown
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

