lab:
  title: "CCNA Lab 05 — Static Routing & Default Routes"
  description: "Configure static routes, a default route, and floating static routes. IP addresses are pre-configured."
  notes: "Interface IPs are pre-configured. Your task is to configure routing between the sites."
  timestamp: 1750000000.0
  version: 0.0.3

nodes:
  - id: n0
    label: R1
    node_definition: iosv
    x: -300
    y: 0
    configuration: |
      hostname R1
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description Link to R2
       ip address 10.0.12.1 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/1
       description LAN1
       ip address 192.168.1.1 255.255.255.0
       no shutdown
      !
      interface Loopback0
       ip address 1.1.1.1 255.255.255.255
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

