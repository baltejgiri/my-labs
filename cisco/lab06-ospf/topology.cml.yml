lab:
  title: "CCNA Lab 06 — OSPFv2 (Single-Area & Multi-Area)"
  description: "Configure OSPFv2 in a single area, then extend to a multi-area topology with ABRs."
  notes: "Interface IPs are pre-configured. Configure OSPF process and area assignments."
  timestamp: 1750000000.0
  version: 0.0.3

nodes:
  - id: n0
    label: R1-ABR
    node_definition: iosv
    x: 0
    y: 0
    configuration: |
      hostname R1-ABR
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description Link to R2 (Area 0)
       ip address 10.0.12.1 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/1
       description Link to R3 (Area 0)
       ip address 10.0.13.1 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/2
       description Link to R4 (Area 1)
       ip address 10.0.14.1 255.255.255.252
       no shutdown
      !
      interface Loopback0
       ip address 1.1.1.1 255.255.255.255
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

