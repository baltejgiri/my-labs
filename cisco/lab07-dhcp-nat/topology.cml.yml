links:
  # R1 GE0/0 → SW1 (LAN1 — DHCP clients)
  - id: l0
    n1: n0
    i1: 0
    n2: n2
    i2: 0
  # R1 GE0/2 → SW2 (LAN2 — DHCP relay segment)
  - id: l1
    n1: n0
    i1: 2
    n2: n3
    i2: 0
  # R1 GE0/1 → R2-ISP
  - id: l2
    n1: n0
    i1: 1
    n2: n1
    i2: 0
  # SW1 access ports
  - id: l3
    n1: n2
    i1: 1
    n2: n4
    i2: 0
  - id: l4
    n1: n2
    i1: 2
    n2: n5
    i2: 0
  # SW2 access ports
  - id: l5
    n1: n3
    i1: 1
    n2: n6
    i2: 0
  - id: l6
    n1: n3
    i1: 2
    n2: n7
    i2: 0
