lab:
  title: "CCNA Lab 10 — IP Services: NTP, SNMP, Syslog & HSRP"
  description: "Configure NTP hierarchy, SNMPv2c/v3, syslog, and HSRP for first-hop redundancy."
  notes: "Interface IPs are pre-configured. Focus on IP services and FHRP configuration."
  timestamp: 1750000000.0
  version: 0.0.3

nodes:
  - id: n0
    label: R1
    node_definition: iosv
    x: -200
    y: 0
    configuration: |
      hostname R1
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description HSRP LAN — link to SW1
       ip address 192.168.1.2 255.255.255.0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Uplink to R3
       ip address 10.0.13.1 255.255.255.252
       no shutdown
      !
      ip route 0.0.0.0 0.0.0.0 10.0.13.2
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

  - id: n1
    label: R2
    node_definition: iosv
    x: 200
    y: 0
    configuration: |
      hostname R2
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description HSRP LAN — link to SW1
       ip address 192.168.1.3 255.255.255.0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Uplink to R3
       ip address 10.0.23.1 255.255.255.252
       no shutdown
      !
      ip route 0.0.0.0 0.0.0.0 10.0.23.2
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

  - id: n2
    label: R3
    node_definition: iosv
    x: 0
    y: -250
    configuration: |
      hostname R3
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description Uplink from R1
       ip address 10.0.13.2 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/1
       description Uplink from R2
       ip address 10.0.23.2 255.255.255.252
       no shutdown
      !
      interface Loopback0
       description Management / NTP Master
       ip address 3.3.3.3 255.255.255.255
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

  - id: n3
    label: SW1
    node_definition: iosvl2
    x: 0
    y: 200
    configuration: |
      hostname SW1
      no ip domain-lookup
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

  - id: n4
    label: PC1
    node_definition: alpine
    x: -200
    y: 400
    configuration: ""
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

  - id: n5
    label: PC2
    node_definition: alpine
    x: 200
    y: 400
    configuration: ""
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

links:
  # R1 GE0/0 → SW1 GE0/0
  - id: l0
    n1: n0
    i1: 0
    n2: n3
    i2: 0
  # R2 GE0/0 → SW1 GE0/1
  - id: l1
    n1: n1
    i1: 0
    n2: n3
    i2: 1
  # R1 GE0/1 → R3 GE0/0
  - id: l2
    n1: n0
    i1: 1
    n2: n2
    i2: 0
  # R2 GE0/1 → R3 GE0/1
  - id: l3
    n1: n1
    i1: 1
    n2: n2
    i2: 1
  # SW1 access ports
  - id: l4
    n1: n3
    i1: 2
    n2: n4
    i2: 0
  - id: l5
    n1: n3
    i1: 3
    n2: n5
    i2: 0
