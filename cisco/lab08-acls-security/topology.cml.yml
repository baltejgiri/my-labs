lab:
  title: "CCNA Lab 08 — ACLs & Device Security"
  description: "Configure standard, extended, and named ACLs. Harden device access with SSH and AAA."
  notes: "All IPs are pre-configured. Focus on ACL logic and device hardening."
  timestamp: 1750000000.0
  version: 0.0.3

nodes:
  - id: n0
    label: R1
    node_definition: iosv
    x: 0
    y: 0
    configuration: |
      hostname R1
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description Inside LAN
       ip address 192.168.1.1 255.255.255.0
       no shutdown
      !
      interface GigabitEthernet0/1
       description Link to R2
       ip address 10.0.12.1 255.255.255.252
       no shutdown
      !
      ip route 192.168.2.0 255.255.255.0 10.0.12.2
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

  - id: n1
    label: R2
    node_definition: iosv
    x: 300
    y: 0
    configuration: |
      hostname R2
      no ip domain-lookup
      !
      interface GigabitEthernet0/0
       description Link to R1
       ip address 10.0.12.2 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/1
       description Server LAN
       ip address 192.168.2.1 255.255.255.0
       no shutdown
      !
      ip route 192.168.1.0 255.255.255.0 10.0.12.1
      !
      line con 0
       logging synchronous
      !
      end
    tags: []
    boot_disk_size: null
    cpu_limit: null
    cpus: null
    data_volume: null
    hide_links: false
    image_definition: null
    ram: null

