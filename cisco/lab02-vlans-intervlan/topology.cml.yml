lab:
  title: "CCNA Lab 02 — VLANs & Inter-VLAN Routing"
  description: "Configure VLANs, 802.1Q trunks, Router-on-a-Stick, and SVI-based inter-VLAN routing."
  notes: "No VLANs or trunk configuration is pre-applied. Hostnames only."
  timestamp: 1750000000.0
  version: 0.0.3

