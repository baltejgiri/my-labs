links:
  # R1 GE0/0 → SW1 GE0/0 (trunk for Router-on-a-Stick)
  - id: l0
    n1: n0
    i1: 0
    n2: n1
    i2: 0
  # SW1 GE0/1 → SW2 GE0/0 (inter-switch trunk)
  - id: l1
    n1: n1
    i1: 1
    n2: n2
    i2: 0
  # SW1 GE0/2 → PC1 (access VLAN 10)
  - id: l2
    n1: n1
    i1: 2
    n2: n3
    i2: 0
  # SW1 GE0/3 → PC2 (access VLAN 20)
  - id: l3
    n1: n1
    i1: 3
    n2: n4
    i2: 0
  # SW2 GE0/1 → PC3 (access VLAN 10)
  - id: l4
    n1: n2
    i1: 1
    n2: n5
    i2: 0
