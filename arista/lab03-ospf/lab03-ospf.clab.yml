# ============================================================================= Lab 03 — OSPF: Single-Area, Multi-Area, and Troubleshooting Topics: OSPFv2, Router Types, LSA Types, 
# ABR, Area Types, Troubleshooting Author: Baltej Giri Repo: https://github.com/baltejgiri/my-labs Ref: https://www.arista.com/en/um-eos/eos-open-shortest-path-first-version-2 
# =============================================================================
#
# Topology:
#
#  [PC1] [PC2]
#    |                                                            |
#   eth1 eth1 R1 ----eth2----eth1---- R2 ----eth2----eth1---- R3 ----eth2----eth1---- R4
#
#  Area 0 (Backbone): R1 --- R2 --- R3 Area 1 (Regular): R3 --- R4
#
#  Router Roles: R1 — Internal Router (Area 0) R2 — Internal Router (Area 0) / DR/BDR election point R3 — ABR (Area Border Router) / connects Area 0 and Area 1 R4 — Internal Router 
#   (Area 1)
#
#  IP Addressing: R1 Lo0: 1.1.1.1/32 R1-R2 link: 10.0.12.0/30 R2 Lo0: 2.2.2.2/32 R2-R3 link: 10.0.23.0/30 R3 Lo0: 3.3.3.3/32 R3-R4 link: 10.0.34.0/30 R4 Lo0: 4.4.4.4/32 PC1: 
#   192.168.1.10/24 GW: 192.168.1.1 (R1 Ethernet1) PC2: 192.168.4.10/24 GW: 192.168.4.1 (R4 Ethernet1)
# =============================================================================
name: lab03-ospf

topology:

  kinds:
    arista_ceos:
      image: ceos:latest

  nodes:

    r1:
      kind: arista_ceos

    r2:
      kind: arista_ceos

    r3:
      kind: arista_ceos

    r4:
      kind: arista_ceos

    pc1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.1.10/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 192.168.1.1

    pc2:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.4.10/24 dev eth1
        - ip link set eth1 up
        - ip route add default via 192.168.4.1

  links:
    - endpoints: ["pc1:eth1", "r1:eth1"]
    - endpoints: ["r1:eth2", "r2:eth1"]
    - endpoints: ["r2:eth2", "r3:eth1"]
    - endpoints: ["r3:eth2", "r4:eth1"]
    - endpoints: ["r4:eth2", "pc2:eth1"]