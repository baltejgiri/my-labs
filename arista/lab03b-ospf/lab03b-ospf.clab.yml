name: lab03b-ospf

topology:
  kinds:
    arista_ceos:
      image: ceos:latest

  nodes:

    r1:
      kind: arista_ceos
      startup-config: |
        hostname R1
        !
        spanning-tree mode none
        ip routing
        !
        interface Loopback0
           ip address 1.1.1.1/32
        !
        interface Ethernet1
           description R1-to-R2-Area0
           no switchport
           ip address 10.1.1.1/30
        !
        interface Ethernet3
           description R1-to-R3-Area1
           no switchport
           ip address 13.1.1.1/30
        !
        end------------------------------------------------------------------------
    r2:
      kind: arista_ceos
      startup-config: |
        hostname R2
        !
        spanning-tree mode none
        ip routing
        !
        interface Loopback0
           ip address 2.2.2.2/32
        !
        interface Ethernet1
           description R2-to-R1-Area0
           no switchport
           ip address 10.1.1.2/30
        !
        interface Ethernet2
           description R2-to-R4-Area2
           no switchport
           ip address 11.1.1.2/30
        !
        end

    r3:
      kind: arista_ceos
      startup-config: |
        hostname R3
        !
        spanning-tree mode none
        ip routing
        !
        interface Loopback0
           ip address 3.3.3.3/32
        !
        interface Ethernet1
           description R3-to-R1-Area1
           no switchport
           ip address 13.1.1.2/30
        !
        interface Ethernet2
           description R3-to-R4-Area1
           no switchport
           ip address 12.1.1.2/30
        !
        end

    r4:
      kind: arista_ceos
      startup-config: |
        hostname R4
        !
        spanning-tree mode none
        ip routing
        !
        interface Loopback0
           ip address 4.4.4.4/32
        !
        interface Ethernet1
           description R4-to-R2-Area2
           no switchport
           ip address 11.1.1.1/30
        !
        interface Ethernet2
           description R4-to-R3-Area1
           no switchport
           ip address 12.1.1.1/30
        !
        end

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]   # R1-R2  Area 0  10.1.1.0/30
    - endpoints: ["r1:eth3", "r3:eth1"]   # R1-R3  Area 1  13.1.1.0/30
    - endpoints: ["r2:eth2", "r4:eth1"]   # R2-R4  Area 2  11.1.1.0/30
    - endpoints: ["r3:eth2", "r4:eth2"]   # R3-R4  Area 1  12.1.1.0/30
