name: l2-forwarding-clab

topology:
  nodes:
    switch1:
      kind: ceos
      image: ceos:latest
    
    host1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.1.1/24 dev eth1
        - ip link set eth1 up

    host2:
      kind: linux
      image: alpine:latest
      exec: 
        - ip addr add 192.168.1.2/24 dev eth1
        - ip link set eth1 up

    host3:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.1.3/24 dev eth1
        - ip link set eth1 up

  links:
    - endpoints: ["switch1:eth1", "host1:eth1"]
    - endpoints: ["switch1:eth2", "host2:eth1"]
    - endpoints: ["switch1:eth3", "host3:eth1"]
