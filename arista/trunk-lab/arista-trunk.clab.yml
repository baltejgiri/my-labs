name: arista-trunk
topology:
  nodes:
    sw1:
      kind: arista_ceos
      image: ceos:latest
      env:
        INTFTYPE: eth
        ETBA: 1
    sw2:
      kind: arista_ceos
      image: ceos:latest
      env:
        INTFTYPE: eth
        ETBA: 1

    # VLAN 10 Hosts
    pc1:
      kind: linux
      image: alpine:latest
      exec: ["ip addr add 10.10.10.11/24 dev eth1"]
    pc2:
      kind: linux
      image: alpine:latest
      exec: ["ip addr add 10.10.10.12/24 dev eth1"]

    # VLAN 20 Hosts
    pc3:
      kind: linux
      image: alpine:latest
      exec: ["ip addr add 10.10.20.13/24 dev eth1"]
    pc4:
      kind: linux
      image: alpine:latest
      exec: ["ip addr add 10.10.20.14/24 dev eth1"]

  links:
    # Trunk between switches
    - endpoints: ["sw1:eth1", "sw2:eth1"]
    # VLAN 10 Access ports
    - endpoints: ["sw1:eth2", "pc1:eth1"]
    - endpoints: ["sw2:eth2", "pc2:eth1"]
    # VLAN 20 Access ports
    - endpoints: ["sw1:eth3", "pc3:eth1"]
    - endpoints: ["sw2:eth3", "pc4:eth1"]
