name: dc-starter
topology:
  nodes:
    spine1:
      kind: arista_ceos
      image: ceos:latest
      env:
        INTERFACE: eth
        ETBA: 1
    spine2:
      kind: arista_ceos
      image: ceos:latest
      env:
        INTERFACE: eth
        ETBA: 1
    leaf1:
      kind: arista_ceos
      image: ceos:latest
      env:
        INTERFACE: eth
        ETBA: 1
    leaf2:
      kind: arista_ceos
      image: ceos:latest
      env:
        INTERFACE: eth
        ETBA: 1
  links:
    - endpoints: ["spine1:eth1", "leaf1:eth1"]
    - endpoints: ["spine1:eth2", "leaf2:eth1"]
    - endpoints: ["spine2:eth1", "leaf1:eth2"]
    - endpoints: ["spine2:eth2", "leaf2:eth2"]